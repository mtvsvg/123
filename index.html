<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор XML протоколов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📄 Генератор XML протоколов</h1>
    <p class="desc">Создайте XML-файл для загрузки в систему</p>

    <!-- ============================================================ -->
    <!-- БЛОК ОРГАНИЗАЦИИ -->
    <!-- ============================================================ -->
    <div class="block">
        <div class="block-header">
            <h2>🏢 Организация</h2>
            <button class="btn-add" id="showOrgFormBtn">➕ Добавить</button>
        </div>
        
        <div id="orgForm" class="org-form hidden">
            <input type="text" id="orgNameInput" placeholder="Название организации">
            <input type="text" id="orgInnInput" placeholder="ИНН">
            <button class="btn-save" id="saveOrgBtn">Сохранить</button>
            <button class="btn-cancel" id="cancelOrgBtn">Отмена</button>
        </div>

        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <select id="orgSelect" class="org-select" style="flex:1;min-width:200px;">
                <option value="">-- Выберите организацию --</option>
            </select>
            <button class="btn-delete" id="deleteOrgBtn" title="Удалить выбранную организацию">🗑</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- БЛОК ПРОТОКОЛА -->
    <!-- ============================================================ -->
    <div class="block">
        <h2>📋 Протокол</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Номер протокола</label>
                <input type="text" id="protocolNumber" placeholder="01/26">
            </div>
            <div class="form-group">
                <label>Дата</label>
                <input type="date" id="protocolDate">
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- БЛОК ПРОГРАММ -->
    <!-- ============================================================ -->
    <div class="block">
        <div class="block-header">
            <h2>📚 Программы обучения</h2>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn-add" onclick="selectAllPrograms()">✅ Все</button>
                <button class="btn-add" onclick="selectPrograms([1,4])">📌 1+4</button>
                <button class="btn-add" onclick="clearAllPrograms()">✖ Снять</button>
            </div>
        </div>
        <div id="programsContainer" style="display:flex;flex-wrap:wrap;gap:12px;">
            <label class="program-check">
                <input type="checkbox" value="1" checked> 1. Оказание первой помощи
            </label>
            <label class="program-check">
                <input type="checkbox" value="2"> 2. Использование СИЗ
            </label>
            <label class="program-check">
                <input type="checkbox" value="3"> 3. Общие вопросы охраны труда
            </label>
            <label class="program-check">
                <input type="checkbox" value="4"> 4. Безопасные методы и приемы работ
            </label>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- БЛОК СОТРУДНИКОВ -->
    <!-- ============================================================ -->
    <div class="block">
        <div class="block-header">
            <h2>👥 Сотрудники</h2>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn-add" onclick="addEmployee()">➕ Добавить</button>
                <button class="btn-add" id="importBtn">📤 Импорт из файла</button>
            </div>
        </div>
        <div id="employeesContainer"></div>
        <p style="color:#6a6a8a;font-size:13px;margin-top:8px;">
            💡 Формат файла: каждая строка — сотрудник. 
            <strong>Фамилия, Имя, Отчество, Должность, СНИЛС, Сдал(да/нет)</strong>
        </p>
    </div>

    <!-- ============================================================ -->
    <!-- КНОПКА ГЕНЕРАЦИИ -->
    <!-- ============================================================ -->
    <button class="btn-generate" id="generateBtn">⚡ Создать XML</button>

    <!-- ============================================================ -->
    <!-- РЕЗУЛЬТАТ -->
    <!-- ============================================================ -->
    <div id="resultBlock" class="result-block hidden">
        <h3>✅ XML готов!</h3>
        <a id="downloadLink" href="#" download>📥 Скачать XML</a>
        <button class="btn-cancel" onclick="document.getElementById('resultBlock').classList.add('hidden')">✖ Закрыть</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
