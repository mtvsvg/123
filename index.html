<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор XML протоколов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📄 Генератор XML протоколов</h1>
    <p class="desc">Создайте XML-файл для загрузки в систему</p>

    <!-- ============================================================ -->
    <!-- БЛОК ОРГАНИЗАЦИИ -->
    <!-- ============================================================ -->
    <div class="block">
        <div class="block-header">
            <h2>🏢 Организация</h2>
            <button class="btn-add" id="showOrgFormBtn">➕ Добавить</button>
        </div>
        
        <!-- Форма добавления организации (изначально скрыта) -->
        <div id="orgForm" class="org-form hidden">
            <input type="text" id="orgNameInput" placeholder="Название организации">
            <input type="text" id="orgInnInput" placeholder="ИНН">
            <button class="btn-save" id="saveOrgBtn">Сохранить</button>
            <button class="btn-cancel" id="cancelOrgBtn">Отмена</button>
        </div>

        <!-- Выбор организации -->
        <select id="orgSelect" class="org-select">
            <option value="">-- Выберите организацию --</option>
        </select>
    </div>

    <!-- ============================================================ -->
    <!-- БЛОК ПРОТОКОЛА -->
    <!-- ============================================================ -->
    <div class="block">
        <h2>📋 Протокол</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Номер протокола</label>
                <input type="text" id="protocolNumber" placeholder="01/26">
            </div>
            <div class="form-group">
                <label>Дата</label>
                <input type="date" id="protocolDate">
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- БЛОК ПРОГРАММЫ ОБУЧЕНИЯ -->
    <!-- ============================================================ -->
    <div class="block">
        <h2>📚 Программа обучения</h2>
        <select id="programSelect" class="program-select">
            <option value="1">1. Оказание первой помощи пострадавшим</option>
            <option value="2">2. Использование (применение) СИЗ</option>
            <option value="3">3. Общие вопросы охраны труда и СУОТ</option>
            <option value="4">4. Безопасные методы и приемы работ при воздействии вредных факторов</option>
        </select>
    </div>

    <!-- ============================================================ -->
    <!-- БЛОК СОТРУДНИКОВ -->
    <!-- ============================================================ -->
    <div class="block">
        <div class="block-header">
            <h2>👥 Сотрудники</h2>
            <button class="btn-add" onclick="addEmployee()">➕ Добавить</button>
        </div>
        <div id="employeesContainer"></div>
    </div>

    <!-- ============================================================ -->
    <!-- КНОПКА ГЕНЕРАЦИИ -->
    <!-- ============================================================ -->
    <button class="btn-generate" id="generateBtn">⚡ Создать XML</button>

    <!-- ============================================================ -->
    <!-- РЕЗУЛЬТАТ -->
    <!-- ============================================================ -->
    <div id="resultBlock" class="result-block hidden">
        <h3>✅ XML готов!</h3>
        <a id="downloadLink" href="#" download>📥 Скачать XML</a>
        <button class="btn-cancel" onclick="document.getElementById('resultBlock').classList.add('hidden')">✖ Закрыть</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
